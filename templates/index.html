<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex justify-center items-center h-screen">

    <form
        action="/login"
        method="POST"
        class="bg-white p-8 rounded-xl shadow-lg w-96"
    >

        <h1 class="text-3xl font-bold text-center mb-6">
            SISTec IoT Application 2026
        </h1>

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="w-full border p-3 rounded mb-4"
            required
        >

        <button
            class="w-full bg-blue-500 text-white p-3 rounded"
        >
            Login
        </button>

        <p class="text-center mt-4">
            <a href="/register" class="text-blue-500">
                Register
            </a>
        </p>

    </form>

</div>

</body>
</html>
